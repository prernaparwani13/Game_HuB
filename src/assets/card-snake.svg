      <stop offset="0.45" stop-color="#60A5FA" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="snake" x1="140" y1="140" x2="1060" y2="560" gradientUnits="userSpaceOnUse">
